# Direct File Helm Chart Values
# =============================================================================
# This chart deploys:
# - PostgreSQL database (single instance to conserve resources)
# - Redis cache
# - Direct File API (Spring Boot backend)
# - Direct File Client (React frontend via Nginx)
# =============================================================================

# ---------------------------------------------------------------------------
# Global Settings
# ---------------------------------------------------------------------------
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: "my-local-storage"

# ---------------------------------------------------------------------------
# PostgreSQL Configuration
# ---------------------------------------------------------------------------
postgresql:
  enabled: true

  image:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent

  auth:
    postgresUser: postgres
    database: directfile
    # Use existingSecret for secure password management
    existingSecret: ""
    secretKeys:
      adminPasswordKey: postgres-password

  # Resource limits (memory constrained environment)
  resources:
    limits:
      memory: "512Mi"
      cpu: "500m"
    requests:
      memory: "256Mi"
      cpu: "100m"

  persistence:
    enabled: true
    storageClass: my-local-storage
    accessMode: ReadWriteOnce
    size: 10Gi
    existingClaim: ""

  # Pin to worker node for local PV
  nodeSelector:
    kubernetes.io/hostname: mgplcb05

  # Local PV configuration
  localPV:
    enabled: false
    pvName: psql-direct-file-claim0
    claimName: psql-direct-file-claim0
    size: 10Gi
    accessMode: ReadWriteOnce
    reclaimPolicy: Retain
    storageClass: my-local-storage
    localPath: /opt/k8s-pers/vol1/psql-direct-file
    nodeHostname: mgplcb05

  # PostgreSQL configuration for logging
  # All logging set to WARN or higher per requirements
  postgresqlConfiguration:
    log_min_messages: WARNING
    log_min_error_statement: WARNING
    log_statement: none
    log_duration: off
    log_connections: off
    log_disconnections: off
    log_checkpoints: off
    log_lock_waits: off
    client_min_messages: WARNING

  # Init scripts for creating additional databases if needed
  initdbScripts: {}

# ---------------------------------------------------------------------------
# Redis Configuration
# ---------------------------------------------------------------------------
redis:
  enabled: true

  image:
    repository: redis
    tag: "7.0"
    pullPolicy: IfNotPresent

  auth:
    enabled: true
    existingSecret: ""
    existingSecretPasswordKey: redis-password

  # Resource limits
  resources:
    limits:
      memory: "256Mi"
      cpu: "200m"
    requests:
      memory: "128Mi"
      cpu: "50m"

  persistence:
    enabled: true
    storageClass: my-local-storage
    accessMode: ReadWriteOnce
    size: 2Gi
    existingClaim: ""

  # Pin to worker node for local PV
  nodeSelector:
    kubernetes.io/hostname: mgplcb05

  # Local PV configuration
  localPV:
    enabled: false
    pvName: redis-direct-file-claim0
    claimName: redis-direct-file-claim0
    size: 2Gi
    accessMode: ReadWriteOnce
    reclaimPolicy: Retain
    storageClass: my-local-storage
    localPath: /opt/k8s-pers/vol1/redis-direct-file
    nodeHostname: mgplcb05

  # Redis configuration - loglevel warning per requirements
  configuration: |
    loglevel warning
    maxmemory 200mb
    maxmemory-policy allkeys-lru
    save ""
    appendonly no

# ---------------------------------------------------------------------------
# Direct File API (Spring Boot Backend)
# ---------------------------------------------------------------------------
api:
  enabled: true
  replicaCount: 1

  image:
    repository: ""  # Set in overrides.yaml (build from source or use registry)
    tag: "latest"
    pullPolicy: IfNotPresent

  # Environment variables
  env:
    SPRING_PROFILES_ACTIVE: "production"
    LOG_LEVEL: "WARN"
    LOGGING_LEVEL_ROOT: "WARN"
    LOGGING_LEVEL_GOV_IRS: "WARN"
    LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: "WARN"
    LOGGING_LEVEL_ORG_HIBERNATE: "WARN"
    DF_API_PORT: "8080"

  # Secret environment variables (from K8s secrets)
  envFromSecrets:
    - name: direct-file-database-url-secret
      keys:
        - key: database-url
          envName: DATABASE_URL
    - name: direct-file-app-secret
      keys:
        - key: wrapping-key
          envName: LOCAL_WRAPPING_KEY

  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080

  resources:
    limits:
      memory: "1Gi"
      cpu: "1000m"
    requests:
      memory: "512Mi"
      cpu: "200m"

  # Health checks
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Direct File Client (React Frontend)
# ---------------------------------------------------------------------------
client:
  enabled: true
  replicaCount: 1

  image:
    repository: ""  # Set in overrides.yaml
    tag: "latest"
    pullPolicy: IfNotPresent

  env:
    NODE_ENV: "production"
    LOG_LEVEL: "warn"

  service:
    type: ClusterIP
    port: 80
    targetPort: 3000

  resources:
    limits:
      memory: "256Mi"
      cpu: "200m"
    requests:
      memory: "128Mi"
      cpu: "50m"

  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5

  readinessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Ingress Configuration (disabled - using Cloudflare tunnel)
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: direct-file.local
      paths:
        - path: /
          pathType: Prefix
          service: client
        - path: /api
          pathType: Prefix
          service: api
  tls: []

# ---------------------------------------------------------------------------
# Service Account
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# ---------------------------------------------------------------------------
# Security Contexts
# ---------------------------------------------------------------------------
podSecurityContext: {}
securityContext: {}

# ---------------------------------------------------------------------------
# Autoscaling (disabled for resource-constrained environment)
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false

# ---------------------------------------------------------------------------
# Extra Environment Variables (for all components)
# ---------------------------------------------------------------------------
extraEnv: []

# ---------------------------------------------------------------------------
# Labels and Annotations
# ---------------------------------------------------------------------------
commonLabels: {}
commonAnnotations: {}
