{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: direct-file
spec:
  serviceName: {{ .Release.Name }}-redis
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-redis
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-redis
        app.kubernetes.io/name: redis
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: cache
    spec:
      {{- if .Values.redis.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.redis.nodeSelector | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 999
      containers:
      - name: redis
        image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
        imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
        command:
        - redis-server
        - /etc/redis/redis.conf
        {{- if .Values.redis.auth.enabled }}
        - --requirepass
        - $(REDIS_PASSWORD)
        {{- end }}
        env:
        {{- if .Values.redis.auth.enabled }}
        {{- if .Values.redis.auth.existingSecret }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.redis.auth.existingSecret }}
              key: {{ .Values.redis.auth.existingSecretPasswordKey | default "redis-password" }}
        {{- end }}
        {{- end }}
        ports:
        - name: redis
          containerPort: 6379
          protocol: TCP
        {{- if .Values.redis.resources }}
        resources:
{{ toYaml .Values.redis.resources | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /data
        - name: redis-config
          mountPath: /etc/redis
        livenessProbe:
          exec:
            command:
              - redis-cli
              {{- if .Values.redis.auth.enabled }}
              - -a
              - $(REDIS_PASSWORD)
              {{- end }}
              - ping
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
              - redis-cli
              {{- if .Values.redis.auth.enabled }}
              - -a
              - $(REDIS_PASSWORD)
              {{- end }}
              - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: redis-config
        configMap:
          name: {{ .Release.Name }}-redis-config
      {{- if .Values.redis.persistence.existingClaim }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ .Values.redis.persistence.existingClaim }}
      {{- else if .Values.redis.localPV.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ .Values.redis.localPV.claimName }}
      {{- end }}
  {{- if not (or .Values.redis.persistence.existingClaim .Values.redis.localPV.enabled) }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - {{ .Values.redis.persistence.accessMode }}
      {{- if .Values.redis.persistence.storageClass }}
      storageClassName: {{ .Values.redis.persistence.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.redis.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-redis-config
  namespace: {{ .Release.Namespace }}
data:
  redis.conf: |
    # Redis configuration - loglevel warning per requirements
    {{- if .Values.redis.configuration }}
{{ .Values.redis.configuration | indent 4 }}
    {{- else }}
    loglevel warning
    maxmemory 200mb
    maxmemory-policy allkeys-lru
    save ""
    appendonly no
    {{- end }}
{{- end }}
