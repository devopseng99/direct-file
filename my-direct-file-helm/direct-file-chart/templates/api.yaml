{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "direct-file.fullname" . }}-api
  labels:
    {{- include "direct-file.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "direct-file.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "direct-file.api.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.localstack.enabled }}
      initContainers:
      - name: init-localstack
        image: "{{ .Values.localstack.image.repository }}:{{ .Values.localstack.image.tag }}"
        imagePullPolicy: {{ .Values.localstack.image.pullPolicy }}
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Waiting for LocalStack..."
          until curl -sf http://{{ include "direct-file.fullname" . }}-localstack:4566/_localstack/health; do sleep 2; done
          echo "Creating SQS queues..."
          export AWS_ACCESS_KEY_ID=test AWS_SECRET_ACCESS_KEY=test AWS_DEFAULT_REGION=us-west-2
          export AWS_ENDPOINT_URL=http://{{ include "direct-file.fullname" . }}-localstack:4566
          for q in dispatch-queue status-change-queue dlq-status-change-queue submission-confirmation-queue dlq-submission-confirmation-queue s3-notification-event-queue dlq-s3-notification-event-queue send-mail data-import-request-queue dlq-data-import-request-queue data-import-result-queue dlq-data-import-result-queue; do
            awslocal sqs create-queue --queue-name $q 2>/dev/null || true
          done
          echo "Creating SNS topic..."
          awslocal sns create-topic --name submission-confirmation-topic 2>/dev/null || true
          echo "Creating S3 buckets..."
          awslocal s3 mb s3://direct-file-taxreturns 2>/dev/null || true
          awslocal s3 mb s3://operations-jobs 2>/dev/null || true
          echo "LocalStack init complete"
      {{- end }}
      containers:
      - name: api
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.api.port }}
          protocol: TCP
        env:
        # Logging - set to WARN level
        - name: LOG_LEVEL
          value: "{{ .Values.api.logLevel }}"
        - name: LOGGING_LEVEL_ROOT
          value: "{{ .Values.api.springLogLevel }}"
        - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK
          value: "{{ .Values.api.springLogLevel }}"
        - name: LOGGING_LEVEL_GOV_IRS
          value: "{{ .Values.api.springLogLevel }}"
        # Spring profile
        - name: SPRING_PROFILES_ACTIVE
          value: "{{ .Values.api.env.SPRING_PROFILES_ACTIVE }}"
        # Database connection
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://{{ include "direct-file.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
        - name: SPRING_DATASOURCE_USERNAME
          value: "{{ .Values.postgresql.auth.postgresUser }}"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgresql.auth.existingSecret }}
              key: {{ .Values.postgresql.auth.secretKeys.adminPasswordKey }}
        # Redis connection (Spring Boot 3.x uses spring.data.redis.*)
        - name: SPRING_DATA_REDIS_HOST
          value: "{{ include "direct-file.fullname" . }}-redis"
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        {{- if .Values.redis.auth.enabled }}
        - name: SPRING_DATA_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.redis.auth.existingSecret }}
              key: {{ .Values.redis.auth.existingSecretPasswordKey }}
        {{- end }}
        {{- range $key, $value := .Values.api.env }}
        {{- if not (has $key (list "SPRING_PROFILES_ACTIVE" "LOG_LEVEL" "LOGGING_LEVEL_ROOT" "LOGGING_LEVEL_ORG_SPRINGFRAMEWORK" "LOGGING_LEVEL_GOV_IRS")) }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
        startupProbe:
          httpGet:
            path: /df/file/api/actuator/health
            port: {{ .Values.api.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /df/file/api/actuator/health
            port: {{ .Values.api.port }}
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /df/file/api/actuator/health
            port: {{ .Values.api.port }}
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "direct-file.fullname" . }}-api
  labels:
    {{- include "direct-file.api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "direct-file.api.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: {{ .Values.api.service.port }}
    targetPort: {{ .Values.api.port }}
    protocol: TCP
{{- end }}
