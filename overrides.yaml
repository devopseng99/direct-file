# Direct File Production Overrides
# =============================================================================
# Secrets are managed via scripts/setup-secrets.sh
# Do NOT put passwords in this file
#
# Cloudflare tunnel configuration pending
#   -> direct-file-postgresql.direct-file.svc.cluster.local:5432
#   -> direct-file-redis.direct-file.svc.cluster.local:6379
# =============================================================================

# ---------------------------------------------------------------------------
# PostgreSQL Configuration
# ---------------------------------------------------------------------------
postgresql:
  enabled: true

  image:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent

  auth:
    postgresUser: postgres
    database: directfile
    existingSecret: direct-file-postgres-secret
    secretKeys:
      adminPasswordKey: postgres-password

  resources:
    limits:
      memory: "512Mi"
      cpu: "500m"
    requests:
      memory: "256Mi"
      cpu: "100m"

  persistence:
    enabled: true
    storageClass: my-local-storage
    accessMode: ReadWriteOnce
    size: 10Gi
    existingClaim: psql-direct-file-claim0

  # Pin to mgplcb05 worker node
  nodeSelector:
    kubernetes.io/hostname: mgplcb05

  # Local PV configuration
  localPV:
    enabled: true
    pvName: psql-direct-file-claim0
    claimName: psql-direct-file-claim0
    size: 10Gi
    accessMode: ReadWriteOnce
    reclaimPolicy: Retain
    storageClass: my-local-storage
    localPath: /opt/k8s-pers/vol1/psql-direct-file
    nodeHostname: mgplcb05

  # PostgreSQL logging - ALL set to WARNING or higher (INFO is OFF)
  postgresqlConfiguration:
    log_min_messages: WARNING
    log_min_error_statement: WARNING
    log_statement: none
    log_duration: off
    log_connections: off
    log_disconnections: off
    log_checkpoints: off
    log_lock_waits: off
    client_min_messages: WARNING

# ---------------------------------------------------------------------------
# Redis Configuration
# ---------------------------------------------------------------------------
redis:
  enabled: true

  image:
    repository: redis
    tag: "7.0"
    pullPolicy: IfNotPresent

  auth:
    enabled: true
    existingSecret: direct-file-redis-secret
    existingSecretPasswordKey: redis-password

  resources:
    limits:
      memory: "256Mi"
      cpu: "200m"
    requests:
      memory: "128Mi"
      cpu: "50m"

  persistence:
    enabled: true
    storageClass: my-local-storage
    accessMode: ReadWriteOnce
    size: 2Gi
    existingClaim: redis-direct-file-claim0

  # Pin to mgplcb05 worker node
  nodeSelector:
    kubernetes.io/hostname: mgplcb05

  # Local PV configuration
  localPV:
    enabled: true
    pvName: redis-direct-file-claim0
    claimName: redis-direct-file-claim0
    size: 2Gi
    accessMode: ReadWriteOnce
    reclaimPolicy: Retain
    storageClass: my-local-storage
    localPath: /opt/k8s-pers/vol1/redis-direct-file
    nodeHostname: mgplcb05

  # Redis logging - loglevel warning (INFO is OFF)
  configuration: |
    loglevel warning
    maxmemory 200mb
    maxmemory-policy allkeys-lru
    protected-mode no
    save ""
    appendonly no

# ---------------------------------------------------------------------------
# Direct File API
# ---------------------------------------------------------------------------
api:
  enabled: true
  replicas: 1

  image:
    repository: localhost/direct-file-api
    tag: latest
    pullPolicy: Never

  port: 8080

  # Logging - ALL set to WARN (INFO is OFF)
  logLevel: WARN
  springLogLevel: WARN

  env:
    SPRING_PROFILES_ACTIVE: development
    LOCAL_WRAPPING_KEY: dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXRlc3Q=
    DIRECT_FILE_LOADER_LOAD_AT_STARTUP: "false"
    DIRECT_FILE_AWS_SNS_SUBMISSION_CONFIRMATION_PUBLISH_ENABLED: "false"
    DIRECT_FILE_AWS_SNS_ENDPOINT: "http://direct-file-localstack:4566"
    DIRECT_FILE_AWS_MESSAGEQUEUE_ENDPOINT: "http://direct-file-localstack:4566"
    DIRECT_FILE_AWS_S3_ENDPOINT: "http://direct-file-localstack:4566"
    DIRECT_FILE_AWS_ELASTICACHE_ENDPOINT: "http://direct-file-localstack:4566"
    DIRECT_FILE_AWS_SES_ENDPOINT: "http://direct-file-localstack:4566"
    DIRECT_FILE_AWS_KMSENDPOINT: "http://direct-file-localstack:4566"
    AWS_ACCESS_KEY_ID: test
    AWS_SECRET_ACCESS_KEY: test
    AWS_DEFAULT_REGION: us-west-2
    LOG_LEVEL: WARN
    LOGGING_LEVEL_ROOT: WARN
    LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: WARN
    LOGGING_LEVEL_GOV_IRS: WARN
    LOGGING_LEVEL_ORG_HIBERNATE: WARN
    LOGGING_LEVEL_ORG_APACHE: WARN
    LOGGING_LEVEL_COM_ZAXXER: WARN

  resources:
    limits:
      memory: "1Gi"
      cpu: "1000m"
    requests:
      memory: "512Mi"
      cpu: "250m"

  service:
    type: ClusterIP
    port: 8080

# ---------------------------------------------------------------------------
# Direct File Client
# ---------------------------------------------------------------------------
client:
  enabled: true
  replicaCount: 1
  port: 3000

  image:
    repository: localhost/direct-file-client
    tag: latest
    pullPolicy: Never

  service:
    port: 3000

  env:
    LOG_LEVEL: "warn"

  resources:
    limits:
      memory: "256Mi"
      cpu: "200m"
    requests:
      memory: "128Mi"
      cpu: "100m"

# ---------------------------------------------------------------------------
# LocalStack (mock AWS services: S3, SQS, SNS, KMS)
# ---------------------------------------------------------------------------
localstack:
  enabled: true
  image:
    repository: docker.io/localstack/localstack
    tag: "3.0"
    pullPolicy: IfNotPresent
  resources:
    limits:
      memory: "512Mi"
      cpu: "500m"
    requests:
      memory: "256Mi"
      cpu: "100m"

# ---------------------------------------------------------------------------
# Ingress (disabled - using Cloudflare tunnel)
# ---------------------------------------------------------------------------
ingress:
  enabled: false

# ---------------------------------------------------------------------------
# Autoscaling (disabled - resource constrained environment)
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false

# ---------------------------------------------------------------------------
# Network Policy (created separately via manifests/)
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false

# ---------------------------------------------------------------------------
# Service Account
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""
